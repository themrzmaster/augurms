app = "augur-ms"
primary_region = "iad"

[build]

[env]
  PORT = "3000"
  HOSTNAME = "::"
  NODE_ENV = "production"
  COSMIC_ROOT = "/cosmic"

[mounts]
  source = "cosmic_data"
  destination = "/cosmic"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1
