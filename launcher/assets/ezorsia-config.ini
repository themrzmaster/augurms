[general]
;resolution (reccomended: 1280x720, 1366x768)
width=1280
height=720

;AugurMS server IP
ServerIP_Address=213.188.212.103

;gain messages (default 26; min 6, max 255)
MsgAmount=26

;window mode (true/false)
WindowedMode=true

;skip Wizet/Nexon logos (true/false)
RemoveLogos=true

[optional]
;damage cap (enter as #.0)
setDamageCap=199999.0

useTubi=false

;movement speed cap (default 140)
speedMovementCap=140

;only true if you edited login frame in UI.wz
CustomLoginFrame=false

;only true if you edited cash shop background
ownCashShopFrame=false

;use v62 exp table (client display only)
useV62_ExpTable=false

;custom dll loading (keep defaults to disable)
use_custom_dll_1=CUSTOM.dll
use_custom_dll_2=CUSTOM2.dll
use_custom_dll_3=CUSTOM3.dll

[debug]
;startup delay for COM/DirectInput initialization (increase if game fails to launch)
sleepTime=30

[dev]
;login fix for Cosmic
editSendCheckPasswordPacket=true
;input freeze fix on login page
ezorsiaCheckExecPathReg=false
