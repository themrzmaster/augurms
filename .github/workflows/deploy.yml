name: Deploy & Release

on:
  workflow_dispatch:
    inputs:
      dashboard:
        description: 'Deploy dashboard'
        type: boolean
        default: true
      server:
        description: 'Deploy game server'
        type: boolean
        default: false
      launcher:
        description: 'Build launcher'
        type: boolean
        default: false

jobs:
  deploy-dashboard:
    if: ${{ inputs.dashboard }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Set Fly.io secrets
        run: |
          cat <<'SECRETS' | flyctl secrets import --app augur-ms --stage
          DB_HOST=${{ secrets.DB_HOST }}
          DB_PORT=${{ secrets.DB_PORT }}
          DB_USER=${{ secrets.DB_USER }}
          DB_PASS=${{ secrets.DB_PASS }}
          DB_NAME=${{ secrets.DB_NAME }}
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          ADMIN_USER=${{ secrets.ADMIN_USER }}
          ADMIN_PASS_HASH=${{ secrets.ADMIN_PASS_HASH }}
          OPENROUTER_API_KEY=${{ secrets.OPENROUTER_API_KEY }}
          TRIPO3D_API_KEY=${{ secrets.TRIPO3D_API_KEY }}
          GM_ITEM_GEN_DAILY_CAP=${{ secrets.GM_ITEM_GEN_DAILY_CAP }}
          GM_API_SECRET=${{ secrets.GM_API_SECRET }}
          TURNSTILE_SECRET_KEY=${{ secrets.TURNSTILE_SECRET_KEY }}
          R2_ENDPOINT=${{ secrets.R2_ENDPOINT }}
          R2_ACCESS_KEY=${{ secrets.R2_ACCESS_KEY }}
          R2_SECRET_KEY=${{ secrets.R2_SECRET_KEY }}
          R2_BUCKET=${{ secrets.R2_BUCKET }}
          R2_PUBLIC_URL=${{ secrets.R2_PUBLIC_URL }}
          DISCORD_WEBHOOK_URL=${{ secrets.DISCORD_WEBHOOK_URL }}
          GTOP100_PINGBACK_KEY=${{ secrets.GTOP100_PINGBACK_KEY }}
          FLY_API_TOKEN=${{ secrets.FLY_API_TOKEN }}
          GH_DISPATCH_TOKEN=${{ secrets.GH_DISPATCH_TOKEN }}
          SECRETS
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Deploy dashboard
        run: flyctl deploy ./dashboard --remote-only --build-arg NEXT_PUBLIC_TURNSTILE_SITE_KEY="${{ secrets.NEXT_PUBLIC_TURNSTILE_SITE_KEY }}"
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  deploy-server:
    if: ${{ inputs.server }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Set Fly.io secrets
        run: |
          cat <<'SECRETS' | flyctl secrets import --app augur-ms-game --stage
          DB_PASS=${{ secrets.DB_PASS }}
          GAME_HOST=${{ secrets.GAME_HOST }}
          DISABLE_AUTO_REGISTER=${{ secrets.DISABLE_AUTO_REGISTER }}
          SECRETS
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Deploy game server
        run: flyctl deploy ./server --remote-only --build-arg CACHE_BUST=${{ github.sha }}
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  build-launcher:
    if: ${{ inputs.launcher }}
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: launcher
        run: npm ci

      - name: Build Windows installer
        working-directory: launcher
        run: npx electron-builder --win --x64

      - name: Get version
        id: version
        working-directory: launcher
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Launcher version: $VERSION"

      - name: Delete existing release
        continue-on-error: true
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release delete "launcher-v${{ steps.version.outputs.version }}" --yes

      - name: Create release with launcher
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "launcher-v${{ steps.version.outputs.version }}" \
            --title "AugurMS Launcher v${{ steps.version.outputs.version }}" \
            --notes "Auto-built AugurMS Launcher for Windows. Download and run to play AugurMS." \
            "launcher/dist/AugurMS Setup ${{ steps.version.outputs.version }}.exe"
