name: Ban Judge Cron

on:
  schedule:
    - cron: "0 3 * * *" # daily at 03:00 UTC (matches ban_judge_schedule.daily_hour_utc)

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Ping ban judge cron check
        run: |
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" https://augurms.com/api/ban-judge/cron/check)
          echo "Status: $RESPONSE"
